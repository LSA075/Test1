<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Велокомпьютер GPS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.2.1/ol.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Helvetica Neue', sans-serif; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; }
        #map { flex:1; width:100%; }
        .layer-switch { position: absolute; top: 10px; right: 10px; z-index: 1000; background: #111; border-radius: 8px; padding: 5px; display: flex; gap: 5px; }
        .layer-btn { font-size: 14px; padding: 6px 12px; border: none; border-radius: 5px; background: #333; color: white; cursor: pointer; }
        .layer-btn.active { background: #4CAF50; }
        .center-btn { position: absolute; bottom: 120px; right: 10px; z-index: 1000; background: #111; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: 2px solid #555; }
        .center-btn:active { background: #333; }
        .panel { padding:10px 15px; background: #111; display: flex; flex-wrap: wrap; justify-content: space-around; align-items: center; }
        .stat { text-align: center; min-width: 70px; }
        .stat .value { font-size: 28px; font-weight: bold; }
        .stat .label { font-size: 12px; color: #aaa; }
        .speed-large { font-size: 48px; font-weight: bold; }
        .unit { font-size: 18px; color: #aaa; }
        .buttons { display: flex; gap: 10px; margin: 5px 0; }
        button { font-size: 18px; padding: 10px 20px; border: none; border-radius: 8px; background: #4CAF50; color: white; cursor: pointer; }
        button:disabled { background: #555; }
        button.stop { background: #f44336; }
        .info-row { display: flex; justify-content: space-between; padding: 5px 10px; background: #1a1a1a; font-size: 14px; }
        .gps-status { font-size: 12px; color: #aaa; margin-left: 10px; }
        .gps-hint { background: #222; padding: 10px; margin: 5px 10px; border-radius: 8px; font-size: 14px; color: #ff9800; text-align: center; display: none; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="layer-switch" id="layerSwitch">
        <button class="layer-btn active" data-layer="osm">Карта</button>
        <button class="layer-btn" data-layer="sat">Спутник</button>
    </div>
    <div class="center-btn" id="centerBtn" title="Моё местоположение">📍</div>
    <div class="info-row">
        <span id="tripTime">00:00:00</span>
        <span id="tripDist">0.00 км</span>
        <span class="gps-status" id="gpsStatus"></span>
    </div>
    <div class="gps-hint" id="gpsHint">
        ⚠️ Нет доступа к геолокации.<br>
        Откройте Настройки → Safari → Геолокация → Разрешить для этого сайта.
    </div>
    <div class="panel">
        <div class="stat">
            <div class="speed-large" id="currentSpeed">0</div>
            <div class="unit">км/ч</div>
        </div>
        <div class="stat">
            <div class="value" id="avgSpeed">0.0</div>
            <div class="label">средняя</div>
        </div>
        <div class="stat">
            <div class="value" id="maxSpeed">0.0</div>
            <div class="label">макс</div>
        </div>
        <div class="stat">
            <div class="value" id="distance">0.00</div>
            <div class="label">км</div>
        </div>
    </div>
    <div class="buttons" style="justify-content: center;">
        <button id="startBtn">▶ Старт</button>
        <button id="pauseBtn" disabled>⏸ Пауза</button>
        <button id="resetBtn" class="stop">■ Стоп</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ol@v10.2.1/dist/ol.js"></script>
    <script>
        // === КАРТА ===
        const osmLayer = new ol.layer.Tile({
            source: new ol.source.OSM({ url: 'https://tile.openstreetmap.ru/{z}/{x}/{y}.png' }),
            visible: true
        });
        const satLayer = new ol.layer.Tile({
            source: new ol.source.TileImage({
                url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                attributions: '&copy; ESRI ...'
            }),
            visible: false
        });
        const map = new ol.Map({
            target: 'map',
            layers: [osmLayer, satLayer],
            view: new ol.View({ center: ol.proj.fromLonLat([37.61, 55.75]), zoom: 15 }),
            controls: []
        });
        map.addControl(new ol.control.Zoom({ zoomInLabel: '+', zoomOutLabel: '−' }));
        map.addControl(new ol.control.Attribution({ collapsible: false }));

        // Переключение слоёв
        document.querySelectorAll('.layer-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const layer = this.dataset.layer;
                document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                osmLayer.setVisible(layer === 'osm');
                satLayer.setVisible(layer === 'sat');
            });
        });

        // Кнопка центрирования
        document.getElementById('centerBtn').addEventListener('click', () => {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(pos => {
                const coord = ol.proj.fromLonLat([pos.coords.longitude, pos.coords.latitude]);
                map.getView().animate({ center: coord, duration: 500 });
                markerFeature.setGeometry(new ol.geom.Point(coord));
            }, err => alert('Ошибка местоположения'), { enableHighAccuracy: true, timeout: 5000 });
        });

        // === ТРЕК (оптимизированный) ===
        const trackLineString = new ol.geom.LineString([]); // изменяемая геометрия
        const trackFeature = new ol.Feature({ geometry: trackLineString });
        const trackSource = new ol.source.Vector({ features: [trackFeature] });
        const trackLayer = new ol.layer.Vector({
            source: trackSource,
            style: new ol.style.Style({ stroke: new ol.style.Stroke({ color: '#00ffff', width: 4 }) })
        });
        map.addLayer(trackLayer);

        const markerFeature = new ol.Feature(new ol.geom.Point([0,0]));
        markerFeature.setStyle(new ol.style.Style({
            image: new ol.style.Circle({ radius: 8, fill: new ol.style.Fill({ color: '#ffff00' }), stroke: new ol.style.Stroke({ color: '#000', width: 1 }) })
        }));
        const markerSource = new ol.source.Vector({ features: [markerFeature] });
        const markerLayer = new ol.layer.Vector({ source: markerSource });
        map.addLayer(markerLayer);

        // === СОСТОЯНИЕ ===
        let isRecording = false, isPaused = false, watchId = null;
        let tripStartTime = null, totalDistance = 0, lastPoint = null;
        let maxSpeed = 0, speedSum = 0, speedCount = 0;
        let coordBuffer = []; // накапливаем координаты для пакетной вставки
        const MAX_SPEED_JUMP = 20; // м/с (~72 км/ч) — игнорируем нереальные скачки

        // DOM
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const currentSpeedEl = document.getElementById('currentSpeed');
        const avgSpeedEl = document.getElementById('avgSpeed');
        const maxSpeedEl = document.getElementById('maxSpeed');
        const distanceEl = document.getElementById('distance');
        const tripTimeEl = document.getElementById('tripTime');
        const tripDistEl = document.getElementById('tripDist');
        const gpsStatusEl = document.getElementById('gpsStatus');
        const gpsHintEl = document.getElementById('gpsHint');

        // === УТИЛИТЫ ===
        function toRad(deg) { return deg * Math.PI/180; }
        function haversineDistance(p1, p2) {
            const R = 6371e3;
            const dLat = toRad(p2.lat - p1.lat), dLon = toRad(p2.lng - p1.lng);
            const a = Math.sin(dLat/2)**2 + Math.cos(toRad(p1.lat))*Math.cos(toRad(p2.lat))*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function isValidPosition(pos) {
            if (!lastPoint) return true;
            const dist = haversineDistance(lastPoint, { lat: pos.coords.latitude, lng: pos.coords.longitude });
            const dt = (pos.timestamp - (tripStartTime + (trackLineString.getCoordinates().length ? pos.timestamp - trackLineString.getLastCoordinate()[2] : 0))) / 1000; // грубая оценка времени
            // Если скачок > 50 метров за секунду — вероятно, ошибка
            if (dist > 50 && dt < 2) return false;
            return true;
        }

        function updateStats(position, force = false) {
            const speedMps = position.coords.speed >= 0 ? position.coords.speed : 0;
            const kmh = speedMps * 3.6;
            // Фильтр: игнорируем нулевую скорость, если только что двигались (дребезг)
            if (!force && kmh === 0 && lastPoint && lastPoint.speed > 2) return;

            currentSpeedEl.textContent = Math.round(kmh);
            if (kmh > maxSpeed) maxSpeed = kmh;
            maxSpeedEl.textContent = maxSpeed.toFixed(1);
            if (kmh > 0) { speedSum += kmh; speedCount++; }
            const avg = speedCount > 0 ? speedSum / speedCount : 0;
            avgSpeedEl.textContent = avg.toFixed(1);

            const newPoint = { lat: position.coords.latitude, lng: position.coords.longitude, speed: kmh };
            if (lastPoint && isValidPosition(position)) {
                const dist = haversineDistance(lastPoint, newPoint);
                totalDistance += dist;
                distanceEl.textContent = (totalDistance / 1000).toFixed(2);
                tripDistEl.textContent = (totalDistance / 1000).toFixed(2) + ' км';
                lastPoint = newPoint;
            } else if (!lastPoint) {
                lastPoint = newPoint;
            }

            if (tripStartTime) {
                const elapsed = Math.floor((Date.now() - tripStartTime) / 1000);
                tripTimeEl.textContent = new Date(elapsed * 1000).toISOString().substr(11, 8);
            }
            gpsStatusEl.textContent = 'GPS ✓';
            gpsHintEl.style.display = 'none';
        }

        function addTrackPoint(coord) {
            coordBuffer.push(coord);
            // Добавляем точки в трек каждые 2 секунды или если накопилось 5 точек
            if (coordBuffer.length >= 5 || (coordBuffer.length > 0 && Date.now() - lastBufferFlush > 2000)) {
                const coords = coordBuffer.map(c => [c[0], c[1]]); // только x,y
                trackLineString.appendCoordinate(coordBuffer[coordBuffer.length-1]); // последняя точка
                // Для плавности можно добавлять все, но appendCoordinate только одну; проще перестроить всю линию
                // Используем setCoordinates с текущим массивом
                const allCoords = trackLineString.getCoordinates();
                allCoords.push(...coords);
                trackLineString.setCoordinates(allCoords);
                coordBuffer = [];
                lastBufferFlush = Date.now();
            }
            // Маркер всегда обновляем
            markerFeature.setGeometry(new ol.geom.Point(coord));
            map.getView().setCenter(coord);
        }
        let lastBufferFlush = 0;

        // === ГЕОЛОКАЦИЯ ===
        function geolocationSuccess(position) {
            if (!isRecording || isPaused) return;
            if (!isValidPosition(position)) return;
            updateStats(position);
            const coord = ol.proj.fromLonLat([position.coords.longitude, position.coords.latitude]);
            addTrackPoint(coord);
        }

        function geolocationError(err) {
            gpsStatusEl.textContent = 'Ошибка: ' + err.message;
            if (err.code === 1) gpsHintEl.style.display = 'block';
        }

        function startRecording() {
            if (!navigator.geolocation) return;
            gpsHintEl.style.display = 'none';
            gpsStatusEl.textContent = 'Запрос доступа...';
            startBtn.disabled = true;
            navigator.geolocation.getCurrentPosition((pos) => {
                isRecording = true; isPaused = false;
                tripStartTime = Date.now();
                totalDistance = 0; maxSpeed = 0; speedSum = 0; speedCount = 0;
                lastPoint = null;
                trackLineString.setCoordinates([]);
                coordBuffer = []; lastBufferFlush = Date.now();
                updateUIState();
                const coord = ol.proj.fromLonLat([pos.coords.longitude, pos.coords.latitude]);
                markerFeature.setGeometry(new ol.geom.Point(coord));
                map.getView().setCenter(coord);
                gpsStatusEl.textContent = 'Старт!';
                watchId = navigator.geolocation.watchPosition(
                    geolocationSuccess,
                    geolocationError,
                    { enableHighAccuracy: true, maximumAge: 2000, timeout: 5000 }
                );
            }, (err) => {
                startBtn.disabled = false;
                gpsStatusEl.textContent = 'Ошибка';
                if (err.code === 1) gpsHintEl.style.display = 'block';
            }, { enableHighAccuracy: true, timeout: 10000 });
        }

        function pauseRecording() {
            isPaused = true;
            if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            updateUIState();
            gpsStatusEl.textContent = 'Пауза';
        }

        function resumeRecording() {
            if (!isRecording || !isPaused) return;
            isPaused = false;
            watchId = navigator.geolocation.watchPosition(geolocationSuccess, geolocationError,
                { enableHighAccuracy: true, maximumAge: 2000, timeout: 5000 });
            updateUIState();
            gpsStatusEl.textContent = 'GPS ✓';
        }

        function resetTrip() {
            if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            isRecording = false; isPaused = false;
            trackLineString.setCoordinates([]);
            coordBuffer = [];
            totalDistance = 0; maxSpeed = 0; speedSum = 0; speedCount = 0;
            tripStartTime = null; lastPoint = null;
            currentSpeedEl.textContent = '0'; avgSpeedEl.textContent = '0.0'; maxSpeedEl.textContent = '0.0';
            distanceEl.textContent = '0.00'; tripDistEl.textContent = '0.00 км'; tripTimeEl.textContent = '00:00:00';
            markerFeature.setGeometry(new ol.geom.Point([0,0]));
            updateUIState();
            gpsStatusEl.textContent = '';
            gpsHintEl.style.display = 'none';
        }

        function updateUIState() {
            startBtn.disabled = isRecording && !isPaused;
            pauseBtn.disabled = !isRecording || isPaused;
            pauseBtn.textContent = isPaused ? '▶ Продолжить' : '⏸ Пауза';
            pauseBtn.style.background = isPaused ? '#ff9800' : '#f44336';
        }

        startBtn.addEventListener('click', startRecording);
        pauseBtn.addEventListener('click', () => isPaused ? resumeRecording() : pauseRecording());
        resetBtn.addEventListener('click', resetTrip);

        // Первичное позиционирование
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const coord = ol.proj.fromLonLat([pos.coords.longitude, pos.coords.latitude]);
                map.getView().setCenter(coord);
                map.getView().setZoom(16);
                markerFeature.setGeometry(new ol.geom.Point(coord));
            }, err => { if (err.code === 1) gpsHintEl.style.display = 'block'; }, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
