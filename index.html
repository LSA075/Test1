<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Велокомпьютер v2 – спутник + история</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.2.1/ol.css">
    <style>
        /* ===== Базовые стили ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== Карта 60% ===== */
        #map {
            height: 60vh;
            width: 100%;
            flex-shrink: 0;
        }

        /* ===== Нижняя панель 40% ===== */
        .dashboard {
            height: 40vh;
            background: #111;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-bar {
            display: flex;
            border-bottom: 1px solid #333;
        }
        .tab-btn {
            flex: 1;
            background: #1a1a1a;
            color: #aaa;
            border: none;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
        }
        .tab-btn.active {
            background: #111;
            color: #fff;
            border-bottom: 2px solid #4CAF50;
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .hidden { display: none !important; }

        /* ===== Статистика текущей поездки ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .stat-item {
            background: #1a1a1a;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 22px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 2px;
        }

        /* ===== Строка управления ===== */
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 8px;
            background: #111;
            border-top: 1px solid #333;
        }
        button {
            font-size: 16px;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }
        button:disabled { background: #555; }
        button.stop { background: #f44336; }
        button.small {
            font-size: 14px;
            padding: 5px 10px;
            background: #333;
        }

        /* ===== История ===== */
        .history-date {
            font-size: 14px;
            font-weight: bold;
            margin: 10px 0 5px;
            color: #ccc;
            border-bottom: 1px solid #333;
            padding-bottom: 3px;
        }
        .history-item {
            background: #1a1a1a;
            border-radius: 5px;
            padding: 8px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .history-item .detail {
            flex: 1;
        }
        .history-item .actions button {
            margin-left: 5px;
            font-size: 12px;
        }

        /* ===== Кнопка центрирования ===== */
        .center-btn {
            position: absolute;
            bottom: calc(40vh + 60px);
            right: 10px;
            z-index: 1000;
            background: #111;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            border: 2px solid #555;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="center-btn" id="centerBtn">📍</div>

    <div class="dashboard">
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="current">Поездка</button>
            <button class="tab-btn" data-tab="history">История</button>
        </div>

        <!-- Текущая поездка -->
        <div class="tab-content" id="tab-current">
            <div class="stats-grid" id="statsCurrent">
                <div class="stat-item"><div class="stat-value" id="curSpeed">0</div><div class="stat-label">Скорость км/ч</div></div>
                <div class="stat-item"><div class="stat-value" id="curDist">0.00</div><div class="stat-label">Дистанция км</div></div>
                <div class="stat-item"><div class="stat-value" id="curTime">00:00</div><div class="stat-label">Время</div></div>
                <div class="stat-item"><div class="stat-value" id="curAvg">0.0</div><div class="stat-label">Средняя км/ч</div></div>
                <div class="stat-item"><div class="stat-value" id="curMax">0.0</div><div class="stat-label">Макс. км/ч</div></div>
                <div class="stat-item"><div class="stat-value" id="curClimb">0</div><div class="stat-label">Набор высоты м</div></div>
            </div>
        </div>

        <!-- История -->
        <div class="tab-content hidden" id="tab-history">
            <div id="historyList"></div>
            <button class="small" id="clearHistoryBtn" style="margin-top:10px;">Очистить историю</button>
        </div>

        <!-- Кнопки управления -->
        <div class="controls">
            <button id="startBtn">▶ Старт</button>
            <button id="pauseBtn" disabled>⏸ Пауза</button>
            <button id="resetBtn" class="stop">■ Стоп</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ol@v10.2.1/dist/ol.js"></script>
    <script>
        /* ==============================
           Вторая тестовая версия
        ================================ */

        // ---------- Карта (спутник ESRI) ----------
        const satelliteLayer = new ol.layer.Tile({
            source: new ol.source.TileImage({
                url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                attributions: '&copy; ESRI'
            })
        });

        const map = new ol.Map({
            target: 'map',
            layers: [satelliteLayer],
            view: new ol.View({
                center: ol.proj.fromLonLat([37.61, 55.75]),
                zoom: 16
            }),
            controls: []
        });
        map.addControl(new ol.control.Zoom({ zoomInLabel: '+', zoomOutLabel: '−' }));
        map.addControl(new ol.control.Attribution({ collapsible: false }));

        // ---------- Слои трека и маркера ----------
        const trackLine = new ol.geom.LineString([]);
        const trackFeature = new ol.Feature({ geometry: trackLine });
        const trackSource = new ol.source.Vector({ features: [trackFeature] });
        map.addLayer(new ol.layer.Vector({
            source: trackSource,
            style: new ol.style.Style({ stroke: new ol.style.Stroke({ color: '#0ff', width: 4 }) })
        }));

        const markerFeature = new ol.Feature(new ol.geom.Point([0,0]));
        markerFeature.setStyle(new ol.style.Style({
            image: new ol.style.Circle({ radius: 8, fill: new ol.style.Fill({ color: '#ff0' }), stroke: new ol.style.Stroke({ color: '#000', width: 1 }) })
        }));
        map.addLayer(new ol.layer.Vector({ source: new ol.source.Vector({ features: [markerFeature] }) }));

        // ---------- Состояние ----------
        let isRecording = false, isPaused = false, watchId = null;
        let tripStart = null, totalDist = 0, lastPoint = null;
        let maxSpeed = 0, speedSum = 0, speedCount = 0;
        let totalClimb = 0, lastAltitude = null;
        let coordBuffer = [], lastFlush = 0;
        let speedHistory = [];

        const MIN_ACCURACY = 20; // метров

        // ---------- DOM-элементы ----------
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const centerBtn = document.getElementById('centerBtn');

        const curSpeedEl = document.getElementById('curSpeed');
        const curDistEl = document.getElementById('curDist');
        const curTimeEl = document.getElementById('curTime');
        const curAvgEl = document.getElementById('curAvg');
        const curMaxEl = document.getElementById('curMax');
        const curClimbEl = document.getElementById('curClimb');

        const historyListEl = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        // ---------- Таймер ----------
        let timerInterval = null;
        function startTimer() {
            stopTimer();
            timerInterval = setInterval(updateTimeDisplay, 1000);
        }
        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        }
        function updateTimeDisplay() {
            if (!tripStart || isPaused) return;
            const sec = Math.floor((Date.now() - tripStart) / 1000);
            curTimeEl.textContent = new Date(sec * 1000).toISOString().substr(14, 5);
        }

        // ---------- Утилиты ----------
        function toRad(d) { return d * Math.PI / 180; }
        function haversine(p1, p2) {
            const R = 6371e3;
            const dLat = toRad(p2.lat - p1.lat), dLon = toRad(p2.lng - p1.lng);
            const a = Math.sin(dLat/2)**2 + Math.cos(toRad(p1.lat)) * Math.cos(toRad(p2.lat)) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // ---------- Обработка GPS ----------
        function processPosition(pos) {
            if (pos.coords.accuracy > MIN_ACCURACY) return false;

            const speedKmh = (pos.coords.speed >= 0 ? pos.coords.speed : 0) * 3.6;
            const alt = pos.coords.altitude || null;

            // Сглаживание скорости
            speedHistory.push(speedKmh);
            if (speedHistory.length > 3) speedHistory.shift();
            const smoothSpeed = speedHistory.reduce((a,b) => a+b, 0) / speedHistory.length;

            curSpeedEl.textContent = Math.round(smoothSpeed);
            if (smoothSpeed > maxSpeed) maxSpeed = smoothSpeed;
            curMaxEl.textContent = maxSpeed.toFixed(1);
            if (smoothSpeed > 0.5) { speedSum += smoothSpeed; speedCount++; }
            curAvgEl.textContent = speedCount ? (speedSum / speedCount).toFixed(1) : '0.0';

            const newPoint = { lat: pos.coords.latitude, lng: pos.coords.longitude, alt };
            if (lastPoint) {
                const dist = haversine(lastPoint, newPoint);
                if (dist > 50 && (Date.now() - pos.timestamp) < 3000) return false;
                totalDist += dist;
                // Набор высоты
                if (lastPoint.alt !== null && alt !== null && alt - lastPoint.alt > 2) {
                    totalClimb += alt - lastPoint.alt;
                }
                curDistEl.textContent = (totalDist / 1000).toFixed(2);
                curClimbEl.textContent = Math.round(totalClimb);
            }
            lastPoint = newPoint;
            return true;
        }

        function addTrackPoint(lon, lat) {
            const coord = ol.proj.fromLonLat([lon, lat]);
            coordBuffer.push(coord);
            if (coordBuffer.length >= 3 || (coordBuffer.length && Date.now() - lastFlush > 2000)) {
                const coords = trackLine.getCoordinates();
                coordBuffer.forEach(c => coords.push([c[0], c[1]]));
                trackLine.setCoordinates(coords);
                coordBuffer = [];
                lastFlush = Date.now();
            }
            markerFeature.setGeometry(new ol.geom.Point(coord));
            map.getView().setCenter(coord);
        }

        function onGPS(pos) {
            if (!isRecording || isPaused) return;
            if (!processPosition(pos)) return;
            addTrackPoint(pos.coords.longitude, pos.coords.latitude);
        }
        function onGPSError(err) {
            console.warn('GPS error', err.message);
        }

        // ---------- Управление ----------
        function startTrip() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(pos => {
                isRecording = true; isPaused = false;
                tripStart = Date.now();
                totalDist = 0; maxSpeed = 0; speedSum = 0; speedCount = 0;
                totalClimb = 0; lastAltitude = null;
                lastPoint = null; speedHistory = [];
                trackLine.setCoordinates([]);
                coordBuffer = []; lastFlush = Date.now();

                const coord = ol.proj.fromLonLat([pos.coords.longitude, pos.coords.latitude]);
                markerFeature.setGeometry(new ol.geom.Point(coord));
                map.getView().setCenter(coord);

                startTimer();
                watchId = navigator.geolocation.watchPosition(onGPS, onGPSError, {
                    enableHighAccuracy: true, maximumAge: 500, timeout: 10000
                });
                updateButtons();
            }, err => {
                alert('Нет доступа к геолокации: ' + err.message);
            }, { enableHighAccuracy: true, timeout: 10000 });
        }

        function pauseTrip() {
            isPaused = true;
            if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            stopTimer();
            updateButtons();
        }
        function resumeTrip() {
            if (!isRecording || !isPaused) return;
            isPaused = false;
            watchId = navigator.geolocation.watchPosition(onGPS, onGPSError, {
                enableHighAccuracy: true, maximumAge: 500, timeout: 10000
            });
            startTimer();
            updateButtons();
        }

        function stopTrip() {
            // Сохраняем поездку перед сбросом
            if (isRecording && totalDist > 100) { // сохраняем, если проехали > 100 м
                saveRide({
                    date: tripStart,
                    duration: Math.floor((Date.now() - tripStart) / 1000),
                    distance: totalDist,
                    avgSpeed: speedCount ? speedSum / speedCount : 0,
                    maxSpeed: maxSpeed,
                    climb: totalClimb
                });
            }
            // Полный сброс
            if (watchId) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            stopTimer();
            isRecording = false; isPaused = false;
            totalDist = 0; maxSpeed = 0; speedSum = 0; speedCount = 0; totalClimb = 0;
            lastPoint = null; speedHistory = [];
            trackLine.setCoordinates([]);
            coordBuffer = [];
            curSpeedEl.textContent = '0'; curDistEl.textContent = '0.00';
            curTimeEl.textContent = '00:00'; curAvgEl.textContent = '0.0';
            curMaxEl.textContent = '0.0'; curClimbEl.textContent = '0';
            markerFeature.setGeometry(new ol.geom.Point([0,0]));
            updateButtons();
            renderHistory(); // обновляем вкладку истории
        }

        function updateButtons() {
            startBtn.disabled = isRecording && !isPaused;
            pauseBtn.disabled = !isRecording || isPaused;
            pauseBtn.textContent = isPaused ? '▶ Продолжить' : '⏸ Пауза';
            pauseBtn.style.background = isPaused ? '#ff9800' : '#f44336';
        }

        // ---------- История (localStorage) ----------
        const HISTORY_KEY = 'velo_rides';
        function getHistory() {
            try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
            catch(e) { return []; }
        }
        function saveRide(ride) {
            const history = getHistory();
            history.push(ride);
            // Сортируем по убыванию даты
            history.sort((a,b) => b.date - a.date);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            renderHistory();
        }
        function deleteRide(index) {
            const history = getHistory();
            history.splice(index, 1);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            renderHistory();
        }
        function clearHistory() {
            if (confirm('Удалить всю историю?')) {
                localStorage.removeItem(HISTORY_KEY);
                renderHistory();
            }
        }

        function renderHistory() {
            const history = getHistory();
            if (!history.length) {
                historyListEl.innerHTML = '<p style="color:#aaa; text-align:center;">Нет сохранённых поездок</p>';
                return;
            }
            let html = '';
            const dateFormatter = new Intl.DateTimeFormat('ru', { day:'numeric', month:'long', year:'numeric' });
            let currentDate = '';
            history.forEach((ride, idx) => {
                const d = new Date(ride.date);
                const dateStr = dateFormatter.format(d);
                if (dateStr !== currentDate) {
                    currentDate = dateStr;
                    html += `<div class="history-date">${dateStr}</div>`;
                }
                const distKm = (ride.distance / 1000).toFixed(1);
                const timeMin = Math.floor(ride.duration / 60);
                const timeSec = ride.duration % 60;
                const timeStr = `${timeMin}:${timeSec.toString().padStart(2,'0')}`;
                html += `<div class="history-item">
                    <div class="detail">
                        <div>${distKm} км | ${timeStr} | сред. ${ride.avgSpeed.toFixed(1)} км/ч</div>
                        <div style="font-size:12px; color:#aaa;">макс. ${ride.maxSpeed.toFixed(1)} | набор ${ride.climb} м</div>
                    </div>
                    <div class="actions">
                        <button class="small" onclick="deleteRide(${idx})">✕</button>
                    </div>
                </div>`;
            });
            historyListEl.innerHTML = html;
        }

        // ---------- Переключение вкладок ----------
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const tab = this.dataset.tab;
                document.getElementById('tab-current').classList.toggle('hidden', tab !== 'current');
                document.getElementById('tab-history').classList.toggle('hidden', tab !== 'history');
                if (tab === 'history') renderHistory();
            });
        });

        // ---------- События кнопок ----------
        startBtn.addEventListener('click', startTrip);
        pauseBtn.addEventListener('click', () => isPaused ? resumeTrip() : pauseTrip());
        resetBtn.addEventListener('click', stopTrip);
        clearHistoryBtn.addEventListener('click', clearHistory);

        // Центрирование
        centerBtn.addEventListener('click', () => {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(pos => {
                const coord = ol.proj.fromLonLat([pos.coords.longitude, pos.coords.latitude]);
                map.getView().animate({ center: coord, duration: 500 });
                markerFeature.setGeometry(new ol.geom.Point(coord));
            }, () => {}, { enableHighAccuracy: true, timeout: 5000 });
        });

        // Первоначальное позиционирование
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const coord = ol.proj.fromLonLat([pos.coords.longitude, pos.coords.latitude]);
                map.getView().setCenter(coord);
                markerFeature.setGeometry(new ol.geom.Point(coord));
            }, () => {}, { enableHighAccuracy: true });
        }

        renderHistory(); // при загрузке показываем историю
    </script>
</body>
</html>
