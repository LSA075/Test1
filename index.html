<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Велокомпьютер (спутник) – тестv2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.2.1/ol.css">
    <style>
        /* === Сброс и базовые стили === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Helvetica Neue', sans-serif;
            background: #000;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* === Карта занимает всё доступное пространство === */
        #map { flex: 1; width: 100%; }

        /* === Кнопка центрирования === */
        .center-btn {
            position: absolute;
            bottom: 120px;
            right: 10px;
            z-index: 1000;
            background: #111;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            border: 2px solid #555;
            user-select: none;
        }
        .center-btn:active { background: #333; }

        /* === Панель статистики === */
        .panel {
            padding: 10px 15px;
            background: #111;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
        }
        .stat { text-align: center; min-width: 70px; }
        .stat .value { font-size: 28px; font-weight: bold; }
        .stat .label { font-size: 12px; color: #aaa; }

        /* === Крупный спидометр === */
        .speed-large { font-size: 48px; font-weight: bold; }
        .unit { font-size: 18px; color: #aaa; }

        /* === Кнопки управления === */
        .buttons { display: flex; gap: 10px; margin: 5px 0; }
        button {
            font-size: 18px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }
        button:disabled { background: #555; }
        button.stop { background: #f44336; }

        /* === Информационная строка (время, дистанция, статус, экспорт) === */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            background: #1a1a1a;
            font-size: 14px;
        }
        .gps-status { font-size: 12px; color: #aaa; margin-left: 10px; }
        .export-btn {
            font-size: 14px;
            padding: 5px 10px;
            margin-left: 10px;
            background: #333;
            color: white;
            border-radius: 5px;
        }

        /* === Подсказка о доступе к геолокации === */
        .gps-hint {
            background: #222;
            padding: 10px;
            margin: 5px 10px;
            border-radius: 8px;
            font-size: 14px;
            color: #ff9800;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Кнопка «Моё местоположение» -->
    <div class="center-btn" id="centerBtn" title="Моё местоположение">📍</div>

    <!-- Верхняя информационная строка -->
    <div class="info-row">
        <span id="tripTime">00:00:00</span>
        <span id="tripDist">0.00 км</span>
        <span class="gps-status" id="gpsStatus"></span>
        <button class="export-btn" id="exportBtn" style="display:none;">GPX</button>
    </div>

    <!-- Подсказка при отказе в геолокации -->
    <div class="gps-hint" id="gpsHint">
        ⚠️ Нет доступа к геолокации.<br>
        Откройте Настройки → Safari → Геолокация → Разрешить для этого сайта.
    </div>

    <!-- Панель со статистикой -->
    <div class="panel">
        <div class="stat">
            <div class="speed-large" id="currentSpeed">0</div>
            <div class="unit">км/ч</div>
        </div>
        <div class="stat">
            <div class="value" id="avgSpeed">0.0</div>
            <div class="label">средняя</div>
        </div>
        <div class="stat">
            <div class="value" id="maxSpeed">0.0</div>
            <div class="label">макс</div>
        </div>
        <div class="stat">
            <div class="value" id="distance">0.00</div>
            <div class="label">км</div>
        </div>
    </div>

    <!-- Кнопки управления -->
    <div class="buttons" style="justify-content: center;">
        <button id="startBtn">▶ Старт</button>
        <button id="pauseBtn" disabled>⏸ Пауза</button>
        <button id="resetBtn" class="stop">■ Стоп</button>
    </div>

    <!-- Подключение OpenLayers -->
    <script src="https://cdn.jsdelivr.net/npm/ol@v10.2.1/dist/ol.js"></script>
    <script>
        /* ==============================
           Вторая тестовая версия
        ================================ */

        // ---------- Карта (только спутник ESRI) ----------
        const satelliteLayer = new ol.layer.Tile({
            source: new ol.source.TileImage({
                url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                attributions: '&copy; ESRI, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
            })
        });

        const map = new ol.Map({
            target: 'map',
            layers: [satelliteLayer],
            view: new ol.View({
                center: ol.proj.fromLonLat([37.61, 55.75]),  // Москва по умолчанию
                zoom: 16
            }),
            controls: []  // добавим свои позже
        });

        // Добавляем элементы управления картой
        map.addControl(new ol.control.Zoom({ zoomInLabel: '+', zoomOutLabel: '−' }));
        map.addControl(new ol.control.Attribution({ collapsible: false }));


        // ---------- Векторные слои для трека и маркера ----------
        // Линия трека (будем менять геометрию на лету)
        const trackLineString = new ol.geom.LineString([]);
        const trackFeature = new ol.Feature({ geometry: trackLineString });
        const trackSource = new ol.source.Vector({ features: [trackFeature] });
        const trackLayer = new ol.layer.Vector({
            source: trackSource,
            style: new ol.style.Style({
                stroke: new ol.style.Stroke({ color: '#00ffff', width: 4 })
            })
        });
        map.addLayer(trackLayer);

        // Маркер текущей позиции
        const markerFeature = new ol.Feature(new ol.geom.Point([0,0]));
        markerFeature.setStyle(new ol.style.Style({
            image: new ol.style.Circle({
                radius: 8,
                fill: new ol.style.Fill({ color: '#ffff00' }),
                stroke: new ol.style.Stroke({ color: '#000', width: 1 })
            })
        }));
        const markerSource = new ol.source.Vector({ features: [markerFeature] });
        const markerLayer = new ol.layer.Vector({ source: markerSource });
        map.addLayer(markerLayer);


        // ---------- Состояние поездки ----------
        let isRecording = false;
        let isPaused = false;
        let watchId = null;               // идентификатор наблюдения за GPS
        let tripStartTime = null;         // метка начала поездки
        let totalDistance = 0;            // общее пройденное расстояние (м)
        let lastPoint = null;             // последняя точка {lat, lng}
        let maxSpeed = 0;                 // максимальная скорость (км/ч)
        let speedSum = 0;                 // сумма скоростей для расчёта средней
        let speedCount = 0;               // количество измерений скорости
        let coordBuffer = [];             // буфер координат для пакетного обновления трека
        let lastBufferFlush = 0;          // время последней отрисовки трека
        let speedHistory = [];            // массив для сглаживания скорости (последние 3 значения)

        // Параметры фильтрации GPS
        const MAX_SPEED_JUMP = 20;        // м/с (≈72 км/ч) – если скорость скачет больше, игнорируем
        const MIN_ACCURACY = 20;          // метров – точки с точностью хуже не используем

        // ---------- Элементы интерфейса ----------
        const startBtn   = document.getElementById('startBtn');
        const pauseBtn   = document.getElementById('pauseBtn');
        const resetBtn   = document.getElementById('resetBtn');
        const exportBtn  = document.getElementById('exportBtn');
        const currentSpeedEl = document.getElementById('currentSpeed');
        const avgSpeedEl     = document.getElementById('avgSpeed');
        const maxSpeedEl     = document.getElementById('maxSpeed');
        const distanceEl     = document.getElementById('distance');
        const tripTimeEl     = document.getElementById('tripTime');
        const tripDistEl     = document.getElementById('tripDist');
        const gpsStatusEl    = document.getElementById('gpsStatus');
        const gpsHintEl      = document.getElementById('gpsHint');


        // ---------- Таймер времени (работает независимо от GPS) ----------
        let timerInterval = null;
        function startTimeTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTripTime, 1000);
        }

        function stopTimeTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateTripTime() {
            if (!tripStartTime || isPaused) return;
            const elapsed = Math.floor((Date.now() - tripStartTime) / 1000);
            const hours   = Math.floor(elapsed / 3600).toString().padStart(2, '0');
            const minutes = Math.floor((elapsed % 3600) / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            tripTimeEl.textContent = `${hours}:${minutes}:${seconds}`;
        }


        // ---------- Математические утилиты ----------
        function toRad(deg) {
            return deg * Math.PI / 180;
        }

        /** Расстояние между двумя точками (формула гаверсинуса) */
        function haversineDistance(p1, p2) {
            const R = 6371e3; // радиус Земли в метрах
            const dLat = toRad(p2.lat - p1.lat);
            const dLon = toRad(p2.lng - p1.lng);
            const a = Math.sin(dLat / 2) ** 2
                    + Math.cos(toRad(p1.lat)) * Math.cos(toRad(p2.lat))
                    * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }


        // ---------- Сглаживание и фильтрация скорости ----------
        /** Возвращает сглаженную скорость (скользящее среднее по последним трём измерениям) */
        function smoothSpeed(speedKmh) {
            speedHistory.push(speedKmh);
            if (speedHistory.length > 3) speedHistory.shift();
            return speedHistory.reduce((sum, v) => sum + v, 0) / speedHistory.length;
        }


        // ---------- Обработка данных GPS ----------
        /**
         * Обновляет статистику на основе новой координаты.
         * Возвращает true, если точка прошла фильтр и была использована.
         */
        function processPosition(position) {
            // Проверка точности
            const accuracy = position.coords.accuracy;
            if (accuracy > MIN_ACCURACY) {
                gpsStatusEl.textContent = `Точность: ${Math.round(accuracy)}м (ожидание)`;
                return false;
            }
            gpsStatusEl.textContent = `Точность: ${Math.round(accuracy)}м`;

            // Скорость из GPS (м/с → км/ч)
            const rawSpeedMps = position.coords.speed >= 0 ? position.coords.speed : 0;
            let speedKmh = rawSpeedMps * 3.6;

            // Сглаживание
            speedKmh = smoothSpeed(speedKmh);

            // Обновление показателей
            currentSpeedEl.textContent = Math.round(speedKmh);
            if (speedKmh > maxSpeed) maxSpeed = speedKmh;
            maxSpeedEl.textContent = maxSpeed.toFixed(1);

            // Средняя скорость (учитываем только реальное движение)
            if (speedKmh > 0.5) {
                speedSum += speedKmh;
                speedCount++;
            }
            const avg = speedCount > 0 ? speedSum / speedCount : 0;
            avgSpeedEl.textContent = avg.toFixed(1);

            // Расчёт пройденного расстояния
            const newPoint = { lat: position.coords.latitude, lng: position.coords.longitude };
            if (lastPoint) {
                const dist = haversineDistance(lastPoint, newPoint);
                // Фильтр пространственных выбросов (резкий скачок > 50 м)
                if (dist > 50 && (Date.now() - position.timestamp) < 3000) {
                    return false; // игнорируем аномалию
                }
                totalDistance += dist;
                distanceEl.textContent = (totalDistance / 1000).toFixed(2);
                tripDistEl.textContent = (totalDistance / 1000).toFixed(2) + ' км';
            }
            lastPoint = newPoint;
            return true;
        }


        // ---------- Обновление трека на карте ----------
        function addTrackPoint(lon, lat) {
            const coord = ol.proj.fromLonLat([lon, lat]);
            coordBuffer.push(coord);

            // Рисуем трек каждые 3 точки или раз в 2 секунды
            const now = Date.now();
            if (coordBuffer.length >= 3 || (coordBuffer.length > 0 && now - lastBufferFlush > 2000)) {
                const currentCoords = trackLineString.getCoordinates();
                coordBuffer.forEach(c => currentCoords.push([c[0], c[1]]));
                trackLineString.setCoordinates(currentCoords);
                coordBuffer = [];
                lastBufferFlush = now;
            }

            // Перемещаем маркер и центрируем карту
            markerFeature.setGeometry(new ol.geom.Point(coord));
            map.getView().setCenter(coord);
        }


        // ---------- Обработчики событий геолокации ----------
        function onGeolocationSuccess(position) {
            if (!isRecording || isPaused) return;

            // Фильтрация и обновление статистики
            if (!processPosition(position)) return;

            // Добавление точки на карту
            addTrackPoint(position.coords.longitude, position.coords.latitude);
        }

        function onGeolocationError(err) {
            gpsStatusEl.textContent = 'Ошибка GPS: ' + err.message;
            if (err.code === 1) { // PERMISSION_DENIED
                gpsHintEl.style.display = 'block';
            }
        }


        // ---------- Управление поездкой ----------
        function startTrip() {
            if (!navigator.geolocation) {
                alert('Геолокация не поддерживается');
                return;
            }

            gpsHintEl.style.display = 'none';
            gpsStatusEl.textContent = 'Запрос доступа...';
            startBtn.disabled = true;

            // Сначала разовый запрос для получения быстрого позиционирования
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    // Инициализация состояния
                    isRecording = true;
                    isPaused = false;
                    tripStartTime = Date.now();
                    totalDistance = 0;
                    maxSpeed = 0;
                    speedSum = 0;
                    speedCount = 0;
                    lastPoint = null;
                    speedHistory = [];
                    trackLineString.setCoordinates([]);
                    coordBuffer = [];
                    lastBufferFlush = Date.now();

                    updateUIState();
                    gpsStatusEl.textContent = 'Старт!';

                    // Показываем начальную точку
                    const coord = ol.proj.fromLonLat([pos.coords.longitude, pos.coords.latitude]);
                    markerFeature.setGeometry(new ol.geom.Point(coord));
                    map.getView().setCenter(coord);

                    // Запускаем таймер времени
                    startTimeTimer();

                    // Включаем наблюдение за GPS
                    watchId = navigator.geolocation.watchPosition(
                        onGeolocationSuccess,
                        onGeolocationError,
                        {
                            enableHighAccuracy: true,   // использовать GPS, а не сотовые вышки
                            maximumAge: 500,            // использовать данные не старше 0.5 секунды
                            timeout: 10000              // ждать фиксации до 10 секунд
                        }
                    );

                    exportBtn.style.display = 'none';
                },
                (err) => {
                    startBtn.disabled = false;
                    gpsStatusEl.textContent = 'Ошибка доступа';
                    if (err.code === 1) gpsHintEl.style.display = 'block';
                    else alert('Не удалось получить местоположение: ' + err.message);
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function pauseTrip() {
            if (!isRecording) return;
            isPaused = true;
            // Останавливаем наблюдение GPS и таймер
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            stopTimeTimer();
            updateUIState();
            gpsStatusEl.textContent = 'Пауза';
        }

        function resumeTrip() {
            if (!isRecording || !isPaused) return;
            isPaused = false;

            // Возобновляем наблюдение
            watchId = navigator.geolocation.watchPosition(
                onGeolocationSuccess,
                onGeolocationError,
                {
                    enableHighAccuracy: true,
                    maximumAge: 500,
                    timeout: 10000
                }
            );
            // Запускаем таймер
            startTimeTimer();
            updateUIState();
            gpsStatusEl.textContent = 'GPS ✓';
        }

        function resetTrip() {
            // Полная остановка
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            stopTimeTimer();
            isRecording = false;
            isPaused = false;

            // Сброс данных
            trackLineString.setCoordinates([]);
            coordBuffer = [];
            totalDistance = 0;
            maxSpeed = 0;
            speedSum = 0;
            speedCount = 0;
            tripStartTime = null;
            lastPoint = null;
            speedHistory = [];

            // Обнуление интерфейса
            currentSpeedEl.textContent = '0';
            avgSpeedEl.textContent = '0.0';
            maxSpeedEl.textContent = '0.0';
            distanceEl.textContent = '0.00';
            tripDistEl.textContent = '0.00 км';
            tripTimeEl.textContent = '00:00:00';
            markerFeature.setGeometry(new ol.geom.Point([0,0]));

            updateUIState();
            gpsStatusEl.textContent = '';
            gpsHintEl.style.display = 'none';
            exportBtn.style.display = 'none';
        }

        function updateUIState() {
            startBtn.disabled = isRecording && !isPaused;
            pauseBtn.disabled = !isRecording || isPaused;
            if (isPaused) {
                pauseBtn.textContent = '▶ Продолжить';
                pauseBtn.style.background = '#ff9800';
            } else {
                pauseBtn.textContent = '⏸ Пауза';
                pauseBtn.style.background = '#f44336';
            }
        }


        // ---------- Экспорт трека в GPX ----------
        function exportToGPX() {
            const coords = trackLineString.getCoordinates();
            if (coords.length < 2) {
                alert('Слишком короткий трек для экспорта');
                return;
            }

            // Формируем GPX-строку
            let gpx = '<?xml version="1.0" encoding="UTF-8"?>\n';
            gpx += '<gpx version="1.1" creator="velocomputer" xmlns="http://www.topografix.com/GPX/1/1">\n';
            gpx += '  <trk>\n    <name>Велопрогулка</name>\n    <trkseg>\n';

            coords.forEach(coord => {
                const lonLat = ol.proj.toLonLat(coord);
                gpx += `      <trkpt lat="${lonLat[1].toFixed(8)}" lon="${lonLat[0].toFixed(8)}"></trkpt>\n`;
            });

            gpx += '    </trkseg>\n  </trk>\n</gpx>';

            // Создаём файл и инициируем скачивание
            const blob = new Blob([gpx], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'track.gpx';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            alert('GPX-файл сохранён. Можно открыть в Яндекс.Картах, Google Earth и т.д.');
        }


        // ---------- Привязка событий к кнопкам ----------
        startBtn.addEventListener('click', startTrip);
        pauseBtn.addEventListener('click', () => {
            if (isPaused) resumeTrip();
            else pauseTrip();
        });
        resetBtn.addEventListener('click', () => {
            // Если есть накопленный трек, предлагаем экспортировать перед сбросом
            if (isRecording && trackLineString.getCoordinates().length > 1) {
                if (confirm('Остановить и экспортировать трек?')) {
                    exportToGPX();
                    resetTrip();
                } else {
                    resetTrip();
                }
            } else {
                resetTrip();
            }
        });
        exportBtn.addEventListener('click', exportToGPX);


        // ---------- Кнопка центрирования ----------
        document.getElementById('centerBtn').addEventListener('click', () => {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const coord = ol.proj.fromLonLat([pos.coords.longitude, pos.coords.latitude]);
                    map.getView().animate({ center: coord, duration: 500 });
                    markerFeature.setGeometry(new ol.geom.Point(coord));
                },
                () => {},
                { enableHighAccuracy: true, timeout: 5000 }
            );
        });


        // ---------- Первоначальное определение позиции ----------
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const coord = ol.proj.fromLonLat([pos.coords.longitude, pos.coords.latitude]);
                    map.getView().setCenter(coord);
                    markerFeature.setGeometry(new ol.geom.Point(coord));
                },
                err => {
                    if (err.code === 1) gpsHintEl.style.display = 'block';
                },
                { enableHighAccuracy: true }
            );
        }
    </script>
</body>
</html>
